# Project Maistro Fly.io deployment configuration
# See https://fly.io/docs/reference/configuration/

app = "maistro"
primary_region = "iad" # change to your closest region

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
# Fly uses x86, but keep this for consistency
MAISTRO_PREFER_PNPM = "1"
MAISTRO_STATE_DIR = "/data"
NODE_OPTIONS = "--max-old-space-size=1536"

[processes]
# SECURITY: Remove --allow-unconfigured for production. Configure
# MAISTRO_GATEWAY_TOKEN via `fly secrets set` before deploying.
# Bind to lan (not 0.0.0.0) — Fly's proxy handles external traffic.
app = "node dist/index.js gateway --port 3000 --bind lan"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = false # Keep running for persistent connections
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[vm]]
size = "shared-cpu-2x"
memory = "2048mb"

[mounts]
source = "maistro_data"
destination = "/data"
