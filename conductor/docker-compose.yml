# Conductor Phase 0 — Infrastructure Services
#
# Usage:
#   docker compose up -d couchdb               # CouchDB only
#   docker compose up -d langfuse-server        # Langfuse only
#   docker compose up -d                        # Everything
#
# UIs:
#   CouchDB:  http://localhost:5984/_utils/
#   Langfuse: http://localhost:3100

services:

  # ── CouchDB (Obsidian LiveSync) ──────────────────────────────────
  couchdb:
    image: couchdb:3
    container_name: conductor-couchdb
    restart: unless-stopped
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-conductor}
    volumes:
      - couchdb_data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (Langfuse backend) ─────────────────────────────────
  langfuse-db:
    image: postgres:16-alpine
    container_name: conductor-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER:-langfuse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Langfuse (observability + prompt management) ──────────────────
  langfuse-server:
    image: langfuse/langfuse:latest
    container_name: conductor-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3100
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-conductor-langfuse-secret-change-me}
      SALT: ${LANGFUSE_SALT:-conductor-langfuse-salt-change-me}
      # Telemetry opt-out for self-hosted
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/public/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  couchdb_data:
  langfuse_db_data:
