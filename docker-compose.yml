services:
  maistro-gateway:
    image: ${MAISTRO_IMAGE:-maistro:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      # Auth token — prefer Docker secrets for production deployments.
      MAISTRO_GATEWAY_TOKEN: ${MAISTRO_GATEWAY_TOKEN}
    volumes:
      - ${MAISTRO_CONFIG_DIR}:/home/node/.maistro
      - ${MAISTRO_WORKSPACE_DIR}:/home/node/.maistro/workspace:ro
    ports:
      # Bind to loopback by default — expose externally only via reverse proxy.
      - "127.0.0.1:${MAISTRO_GATEWAY_PORT:-18789}:18789"
      - "127.0.0.1:${MAISTRO_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    # Container hardening
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${MAISTRO_GATEWAY_BIND:-loopback}",
        "--port",
        "18789",
      ]

  maistro-cli:
    image: ${MAISTRO_IMAGE:-maistro:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      MAISTRO_GATEWAY_TOKEN: ${MAISTRO_GATEWAY_TOKEN}
      BROWSER: echo
    volumes:
      - ${MAISTRO_CONFIG_DIR}:/home/node/.maistro
      - ${MAISTRO_WORKSPACE_DIR}:/home/node/.maistro/workspace
    stdin_open: true
    tty: true
    init: true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    entrypoint: ["node", "dist/index.js"]
